<link rel="stylesheet" href="/assets/css/custom.css">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
<meta property="og:image" content="{{ site.url }}/assets/images/og-banner.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter/Discord -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ site.url }}/assets/images/og-banner.png">

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Back to top button
  const btn = document.createElement('button');
  btn.id = 'back-to-top';
  btn.innerHTML = '<i class="fas fa-chevron-up"></i>';
  btn.setAttribute('aria-label', 'Back to top');
  document.body.appendChild(btn);
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

document.addEventListener('DOMContentLoaded', function() {
  // Lightbox for writeup images
  const overlay = document.createElement('div');
  overlay.id = 'lightbox-overlay';
  const img = document.createElement('img');
  img.id = 'lightbox-img';
  const close = document.createElement('button');
  close.id = 'lightbox-close';
  close.innerHTML = '&times;';
  overlay.appendChild(close);
  overlay.appendChild(img);
  document.body.appendChild(overlay);

  document.querySelectorAll('.page__content img').forEach(function(image) {
    image.style.cursor = 'zoom-in';
    image.addEventListener('click', function() {
      img.src = this.src;
      img.alt = this.alt;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay || e.target === close) {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
  });
});

document.addEventListener('DOMContentLoaded', function() {
  // Code block copy buttons
  document.querySelectorAll('.page__content div.highlighter-rouge, .page__content figure.highlight').forEach(function(block) {
    const wrapper = document.createElement('div');
    wrapper.className = 'code-copy-wrapper';
    block.parentNode.insertBefore(wrapper, block);
    wrapper.appendChild(block);

    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.innerHTML = '<i class="far fa-copy"></i> Copy';
    wrapper.appendChild(btn);

    btn.addEventListener('click', function() {
    // Try to get just the code column from highlighted tables
    const codeLines = block.querySelectorAll('td.code .rouge-code, td.rouge-code');
    let text;
    
    if (codeLines.length > 0) {
      // Highlighted code with line numbers — grab only the code column
      text = Array.from(codeLines)
        .map(td => td.innerText)
        .join('');
    } else {
      // Plain code block without line numbers
      const code = block.querySelector('code');
      if (!code) return;
      text = code.innerText;
    }

    navigator.clipboard.writeText(text).then(function() {
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.innerHTML = '<i class="far fa-copy"></i> Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  });
  });
});
document.addEventListener('DOMContentLoaded', function() {
  // Dropdown with delay to prevent gap-triggered close
  document.querySelectorAll('.masthead__menu-item.dropdown').forEach(function(item) {
    const menu = item.querySelector('.dropdown__menu');
    let closeTimer;
    item.addEventListener('mouseenter', function() {
      clearTimeout(closeTimer);
      menu.style.display = 'block';
    });
    item.addEventListener('mouseleave', function() {
      closeTimer = setTimeout(function() {
        menu.style.display = 'none';
      }, 150);
    });
    menu.addEventListener('mouseenter', function() {
      clearTimeout(closeTimer);
    });
    menu.addEventListener('mouseleave', function() {
      closeTimer = setTimeout(function() {
        menu.style.display = 'none';
      }, 150);
    });
  });
});
</script>

<!-- Mermaid diagrams -->
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  mermaid.initialize({ 
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      primaryColor: '#1f6feb',
      primaryTextColor: '#e6edf3',
      primaryBorderColor: '#30363d',
      lineColor: '#8b949e',
      secondaryColor: '#1b2028',
      tertiaryColor: '#0d1117',
      background: '#0d1117',
      mainBkg: '#1b2028',
      nodeBorder: '#30363d',
      clusterBkg: '#1b2028',
      titleColor: '#e6edf3',
      edgeLabelBackground: '#1b2028',
      fontFamily: 'Share Tech Mono, monospace'
    }
  });

  document.querySelectorAll('code.language-mermaid').forEach(function(el) {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = el.textContent;
    el.parentNode.replaceWith(div);
  });

  mermaid.init();
});
</script>
