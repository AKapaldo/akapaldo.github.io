<link rel="stylesheet" href="/assets/css/custom.css">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
<meta property="og:image" content="{{ site.url }}/assets/images/og-banner.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter/Discord -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ site.url }}/assets/images/og-banner.png">

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Back to top button
  const btn = document.createElement('button');
  btn.id = 'back-to-top';
  btn.innerHTML = '<i class="fas fa-chevron-up"></i>';
  btn.setAttribute('aria-label', 'Back to top');
  document.body.appendChild(btn);
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

document.addEventListener('DOMContentLoaded', function() {
  // Lightbox for writeup images
  const overlay = document.createElement('div');
  overlay.id = 'lightbox-overlay';
  const img = document.createElement('img');
  img.id = 'lightbox-img';
  const close = document.createElement('button');
  close.id = 'lightbox-close';
  close.innerHTML = '&times;';
  overlay.appendChild(close);
  overlay.appendChild(img);
  document.body.appendChild(overlay);

  document.querySelectorAll('.page__content img').forEach(function(image) {
    image.style.cursor = 'zoom-in';
    image.addEventListener('click', function() {
      img.src = this.src;
      img.alt = this.alt;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay || e.target === close) {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
  });
});

document.addEventListener('DOMContentLoaded', function() {
  // Code block copy buttons
  document.querySelectorAll('.page__content div.highlighter-rouge, .page__content figure.highlight').forEach(function(block) {
    const wrapper = document.createElement('div');
    wrapper.className = 'code-copy-wrapper';
    block.parentNode.insertBefore(wrapper, block);
    wrapper.appendChild(block);

    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.innerHTML = '<i class="far fa-copy"></i> Copy';
    wrapper.appendChild(btn);

    btn.addEventListener('click', function() {
      const code = block.querySelector('code');
      if (!code) return;
      navigator.clipboard.writeText(code.innerText).then(function() {
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.innerHTML = '<i class="far fa-copy"></i> Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    });
  });
});
</script>
